name: Collect Nifty OI Data

on:
  schedule:
    # Runs every 5 minutes from 09:00–15:35 IST (= 03:30–10:05 UTC), Mon–Fri
    # IST = UTC+5:30, so 09:00 IST = 03:30 UTC, 15:30 IST = 10:00 UTC
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write      # Required to push the updated CSV back to the repo

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Check out the repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install only what the collector needs ────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests

      # ── 4. Run the collector ────────────────────────────────────────────────
      - name: Collect OI data
        run: python nifty_oi_collector.py

      # ── 5. Commit & push the updated CSV ────────────────────────────────────
      - name: Commit and push updated CSV
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only the data directory
          git add data/

          # Commit only if there are real changes
          if git diff --cached --quiet; then
            echo "No new data to commit (market may be closed)."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update OI data [${TIMESTAMP}]"
            git push
          fi
